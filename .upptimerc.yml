# Change these first
owner: upptime # Your GitHub organization or username, where this repository lives
repo: upptime # The name of this repository

sites:
  - name: Google
    url: https://www.google.com
  - name: Wikipedia
    url: https://en.wikipedia.org
  - name: Hacker News
    url: https://news.ycombinator.com
  - name: Test Broken Site
    url: https://thissitedoesnotexist.koj.co
  - name: IPv6 test
    url: forwardemail.net
    port: 80
    check: "tcp-ping"
    ipv6: true

status-website:
  cname: status.hackernewsbooks.com

  name: Hacker News Books Status
  theme: dark

  logoUrl: https://static.hackernewsbooks.com/hnb_logo_horizontal.png
  faviconPng: /favicon.png

  metaDescription: Real-time status and uptime monitoring for Hacker News Books.
  metaImage: https://static.hackernewsbooks.com/hnb_icon_220x220.png

  introTitle: "**Hacker News Books** status"
  introMessage: |
    Real-time status and uptime monitoring for Hacker News Books.

    Check the health of the main site and related services here before diving into the latest books, reviews, and weekly rankings.

  navbar:
    - title: Status
      href: /
    - title: Main Site
      href: https://hackernewsbooks.com
    - title: Reviews
      href: https://blog.hackernewsbooks.com/reviews/
    - title: Changelog
      href: https://blog.hackernewsbooks.com/changelog/
    - title: Newsletter
      href: https://newsletter.hackernewsbooks.com

  i18n:
    allSystemsOperational: "All systems operational"
    activeIncidents: "Active incidents"
    degradedPerformance: "Degraded performance"
    partialOutage: "Partial outage"
    completeOutage: "Complete outage"
    incidentReport: "Incident report"
    footer: "Built for Hacker News Books with [Upptime](https://upptime.js.org) • [Open source]($REPO)"

